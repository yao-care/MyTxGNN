---
layout: default
---

<article class="drug-report">
  {{ content }}
</article>

<style>
.drug-report {
  max-width: 900px;
}

.drug-report table {
  width: 100%;
  border-collapse: collapse;
  margin: 1rem 0;
}

.drug-report th,
.drug-report td {
  padding: 0.75rem;
  text-align: left;
  border-bottom: 1px solid #e0e0e0;
}

.drug-report th {
  background: #f5f5f5;
  font-weight: 600;
}

.drug-report h1 {
  color: #1976D2;
  border-bottom: 3px solid #1976D2;
  padding-bottom: 0.5rem;
}

.drug-report h2 {
  color: #333;
  margin-top: 2rem;
  border-bottom: 1px solid #e0e0e0;
  padding-bottom: 0.5rem;
}

.drug-report .disclaimer {
  background: #fff8e1;
  border: 1px solid #ffc107;
  border-radius: 8px;
  padding: 1rem;
  margin-top: 2rem;
  font-size: 0.9rem;
}

.drug-report a {
  color: #1976D2;
}

.drug-report a:hover {
  text-decoration: underline;
}

.drug-report ul {
  padding-left: 1.5rem;
}

.drug-report li {
  margin-bottom: 0.5rem;
}
</style>
