name: Update Health News

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen

      - name: Fetch latest news
        run: uv run python scripts/fetchers/my_news.py

      - name: Update news index for website
        run: uv run python scripts/update_news_index.py

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet docs/data/news-index.json || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/data/news-index.json data/news/latest_news.json
          git commit -m "Update health news - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
